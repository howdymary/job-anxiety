name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  root-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repo layout
        run: |
          test -d frontend
          test -d backend
          test -d scraper
          test -d shared
      - name: Check for obvious secrets
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.|/)' | grep -v '\.env\.example$' >/dev/null; then
            echo "Tracked env files found. Review before merging."
            exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: |
          if [ -f package-lock.json ] || [ -f package.json ]; then npm install; fi
      - name: Lint
        run: |
          if [ -f package.json ] && npm run | grep -q "lint"; then npm run lint; else echo "Skip: no frontend lint script yet."; fi

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        run: |
          if [ -f package-lock.json ] || [ -f package.json ]; then npm install; fi
      - name: Type check
        run: |
          if [ -f package.json ] && npm run | grep -q "type-check"; then npm run type-check; else echo "Skip: no backend type-check script yet."; fi

  scraper:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint
        run: |
          if [ -f pyproject.toml ]; then python -m pip install ruff && ruff check .; else echo "Skip: no scraper pyproject yet."; fi
