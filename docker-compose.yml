services:
  frontend:
    image: node:20-alpine
    working_dir: /workspace/frontend
    command: sh -lc "if [ -f package.json ]; then npm install && npm run dev; else echo 'frontend workspace not initialized yet'; tail -f /dev/null; fi"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-replace-me}
    volumes:
      - ./:/workspace
      - frontend-node-modules:/workspace/frontend/node_modules
    depends_on:
      - backend

  backend:
    image: node:20-alpine
    working_dir: /workspace/backend
    command: sh -lc "if [ -f package.json ]; then npm install && npm run dev; else echo 'backend workspace not initialized yet'; tail -f /dev/null; fi"
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://job_anxiety:job_anxiety_password@db:5432/job_anxiety}
      REDIS_URL: ${REDIS_URL:-redis://:job_anxiety_redis_password@redis:6379}
      API_KEY_SECRET: ${API_KEY_SECRET:-replace-me}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - ./:/workspace
      - backend-node-modules:/workspace/backend/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  scraper:
    image: python:3.12-slim
    working_dir: /workspace/scraper
    command: sh -lc "if [ -f requirements.txt ]; then pip install -r requirements.txt -e . && python -m job_anxiety_scraper; else echo 'scraper workspace not initialized yet'; tail -f /dev/null; fi"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://job_anxiety:job_anxiety_password@db:5432/job_anxiety}
      REDIS_URL: ${REDIS_URL:-redis://:job_anxiety_redis_password@redis:6379}
      SCRAPER_USER_AGENT: ${SCRAPER_USER_AGENT:-JobAnxietyBot/1.0 (+https://jobanxiety.ai/bot; jobs@jobanxiety.ai)}
      SCRAPER_DELAY_SECONDS: ${SCRAPER_DELAY_SECONDS:-1.0}
    volumes:
      - ./:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - scraping

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: job_anxiety
      POSTGRES_USER: job_anxiety
      POSTGRES_PASSWORD: job_anxiety_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_anxiety -d job_anxiety"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "job_anxiety_redis_password"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "job_anxiety_redis_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  frontend-node-modules:
  backend-node-modules:
  postgres-data:
  redis-data:
